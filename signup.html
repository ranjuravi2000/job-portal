<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4 shadow" style="width: 350px;">
            <h3 class="text-center mb-3">Signup</h3>

            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="password" class="form-control mb-3" placeholder="Password">

            <button onclick="signup()" class="btn btn-success w-100">Signup</button>
        </div>
    </div>

    <script>
        function signup() {
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            if (email === "" || password === "") {
                alert("Please fill all fields");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];

            let exists = users.find(user => user.email === email);

            if (exists) {
                alert("User already exists");
                return;
            }

            users.push({ email, password });
            localStorage.setItem("users", JSON.stringify(users));

            alert("Signup successful");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
