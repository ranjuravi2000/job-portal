<!DOCTYPE html>
<html>

<head>
    <title>Job Details</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4">
        <div class="card p-4 shadow">
            <h2 id="title"></h2>
            <p id="company"></p>
            <p id="location"></p>
            <p id="salary"></p>

            <button class="btn btn-success mt-3" onclick="applyJob()">Apply Now</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        const jobs = JSON.parse(localStorage.getItem("jobs")) || [];
        const job = jobs.find(j => j.id == id);

        if (job) {
            document.getElementById("title").innerText = job.title;
            document.getElementById("company").innerText = "Company: " + job.company;
            document.getElementById("location").innerText = "Location: " + job.location;
            document.getElementById("salary").innerText = "Salary: " + job.salary;
        } else {
            document.querySelector(".container").innerHTML = "<h3>Job not found</h3>";
        }

        function applyJob() {
            alert("Application submitted successfully!");
        }
    </script>

</body>

</html>
